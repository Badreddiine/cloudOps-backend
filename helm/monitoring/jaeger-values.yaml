# ── Jaeger — tracing distribué ────────────────────────────────────────────────
provisionDataStore:
  cassandra: false
  elasticsearch: false
  kafka: false

allInOne:
  enabled: true
  image:
    tag: "1.52"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - jaeger.cloudops.io
    tls:
      - secretName: jaeger-tls
        hosts:
          - jaeger.cloudops.io

storage:
  type: memory    # prod: elasticsearch

agent:
  enabled: false  # on utilise OTLP direct

collector:
  enabled: false

query:
  enabled: false