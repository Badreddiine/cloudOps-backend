server:
  port: 8083

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/XEPDB1
    username: incidents_app
    password: AppIncidents2025
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      pool-name: NotificationPool
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
      connection-test-query: SELECT 1 FROM DUAL

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false
    locations: classpath:db/migration/oracle
    baseline-on-migrate: true
    user: incidents_app
    password: AppIncidents2025

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "io.cloudops.*"
        spring.json.use.type.headers: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8180/realms/cloudops-realm/protocol/openid-connect/certs
          issuer-uri: http://keycloak:8180/realms/cloudops-realm

# ─── Resilience4j ─────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      kafkaConsumer:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        sliding-window-type: COUNT_BASED

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
  show-actuator: false

logging:
  level:
    io.cloudops: DEBUG
    org.flywaydb: INFO
    com.zaxxer.hikari: INFO
    org.springframework.kafka: INFO
    org.springframework.mail: DEBUG

# ─── Docker Profile ───────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:oracle:thin:@//oracle-eu:1521/XEPDB1

  flyway:
    url: jdbc:oracle:thin:@//oracle-eu:1521/XEPDB1  # ← CORRECTION

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8180/realms/cloudops-realm/protocol/openid-connect/certs
          issuer-uri: http://keycloak:8180/realms/cloudops-realm

  kafka:
    bootstrap-servers: kafka:9092

# ─── Local Profile ────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/XEPDB1

  flyway:
    url: jdbc:oracle:thin:@//localhost:1521/XEPDB1  # ← CORRECTION

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8180/realms/cloudops-realm/protocol/openid-connect/certs
          issuer-uri: http://localhost:8180/realms/cloudops-realm

  kafka:
    bootstrap-servers: localhost:29092

  mail:
    host: localhost
    port: 1025