server:
  port: 8080

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8180/realms/cloudops-realm/protocol/openid-connect/certs

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      routes:
        # ─── Reporting Service ────────────────────────────────────────────
        - id: reporting-service
          uri: http://reporting-service:8084
          predicates:
            - Path=/api/reporting/**
          filters:
            - TokenRelay=
          metadata:
            response-timeout: 30000
            connect-timeout: 5000

        # ─── Incident Service ─────────────────────────────────────────────
        - id: incident-service
          uri: http://incident-service:8082
          predicates:
            - Path=/api/incidents/**
          filters:
            - TokenRelay=

        # ─── Notification Service ─────────────────────────────────────────
        - id: notification-service
          uri: http://notification-service:8083
          predicates:
            - Path=/api/notifications/**
          filters:
            - TokenRelay=

        # ─── WebSocket STOMP (notifications temps reel) ───────────────────
        - id: notification-websocket
          uri: ws://notification-service:8083
          predicates:
            - Path=/ws/**
          filters:
            - TokenRelay=

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG

