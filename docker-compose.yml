services:

  # ═══════════════════════════════════════════════════════════════
  # ORACLE XE EU — PRIMARY
  # ═══════════════════════════════════════════════════════════════
  oracle-eu:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-eu-primary
    environment:
      - ORACLE_PASSWORD=CloudOps2025
      - ORACLE_DATABASE=CLOUDOPS
      - APP_USER=incidents_app
      - APP_USER_PASSWORD=AppIncidents2025
    ports:
      - "1521:1521"
    volumes:
      - oracle-eu-data:/opt/oracle/oradata
      - ./oracle/init:/container-entrypoint-initdb.d
    networks:
      - cloudops-network
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  # ═══════════════════════════════════════════════════════════════
  # ORACLE XE AF — STANDBY Afrique
  # ═══════════════════════════════════════════════════════════════
  oracle-af:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-af-standby
    environment:
      - ORACLE_PASSWORD=CloudOps2025
      - ORACLE_DATABASE=CLOUDOPSAF
      - APP_USER=incidents_app
      - APP_USER_PASSWORD=AppIncidents2025
    ports:
      - "1522:1521"
    volumes:
      - oracle-af-data:/opt/oracle/oradata
    networks:
      - cloudops-network
    depends_on:
      oracle-eu:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  # ═══════════════════════════════════════════════════════════════
  # ORACLE XE US — STANDBY Amerique
  # ═══════════════════════════════════════════════════════════════
  oracle-us:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-us-standby
    environment:
      - ORACLE_PASSWORD=CloudOps2025
      - ORACLE_DATABASE=CLOUDOPSUS
      - APP_USER=incidents_app
      - APP_USER_PASSWORD=AppIncidents2025
    ports:
      - "1523:1521"
    volumes:
      - oracle-us-data:/opt/oracle/oradata
    networks:
      - cloudops-network
    depends_on:
      oracle-eu:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  # ═══════════════════════════════════════════════════════════════
  # KEYCLOAK DB — PostgreSQL
  # ═══════════════════════════════════════════════════════════════
  keycloak-db:
    image: postgres:15-alpine
    container_name: keycloak-db
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=password
    volumes:
      - keycloak-data:/var/lib/postgresql/data
    networks:
      - cloudops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ═══════════════════════════════════════════════════════════════
  # KEYCLOAK
  # ═══════════════════════════════════════════════════════════════
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=password
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_HTTP_PORT=8180
      - KC_HEALTH_ENABLED=true
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - cloudops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8180/health/live"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════
  # ZOOKEEPER
  # ═══════════════════════════════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - cloudops-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ═══════════════════════════════════════════════════════════════
  # KAFKA
  # ═══════════════════════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - cloudops-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════
  # REDIS — Cache Sprint 3
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - cloudops-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # API GATEWAY
  # ═══════════════════════════════════════════════════════════════
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8180/realms/cloudops-realm
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8180/realms/cloudops-realm/protocol/openid-connect/certs
      # Route 0 — Incident Service
      - SPRING_CLOUD_GATEWAY_ROUTES_0_ID=incident-service
      - SPRING_CLOUD_GATEWAY_ROUTES_0_URI=http://incident-service:8082
      - SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0=Path=/api/incidents/**
      - SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_0=TokenRelay=
      # Route 1 — Notification Service
      - SPRING_CLOUD_GATEWAY_ROUTES_1_ID=notification-service
      - SPRING_CLOUD_GATEWAY_ROUTES_1_URI=http://notification-service:8083
      - SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0=Path=/api/notifications/**
      - SPRING_CLOUD_GATEWAY_ROUTES_1_FILTERS_0=TokenRelay=
      # Route 2 — WebSocket STOMP
      - SPRING_CLOUD_GATEWAY_ROUTES_2_ID=notification-websocket
      - SPRING_CLOUD_GATEWAY_ROUTES_2_URI=ws://notification-service:8083
      - SPRING_CLOUD_GATEWAY_ROUTES_2_PREDICATES_0=Path=/ws/**
      - SPRING_CLOUD_GATEWAY_ROUTES_2_FILTERS_0=TokenRelay=
      # Route 3 — Reporting Service
      - SPRING_CLOUD_GATEWAY_ROUTES_3_ID=reporting-service
      - SPRING_CLOUD_GATEWAY_ROUTES_3_URI=http://reporting-service:8084
      - SPRING_CLOUD_GATEWAY_ROUTES_3_PREDICATES_0=Path=/api/reporting/**
      - SPRING_CLOUD_GATEWAY_ROUTES_3_FILTERS_0=TokenRelay=
      - SPRING_CLOUD_GATEWAY_ROUTES_3_FILTERS_1=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
    depends_on:
      keycloak:
        condition: service_started
      incident-service:
        condition: service_started
      notification-service:
        condition: service_started
      reporting-service:
        condition: service_started
    networks:
      - cloudops-network

  # ═══════════════════════════════════════════════════════════════
  # INCIDENT SERVICE
  # ═══════════════════════════════════════════════════════════════
  incident-service:
    build:
      context: .
      dockerfile: incident-service/Dockerfile
    container_name: incident-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8082
      - ORACLE_EU_URL=jdbc:oracle:thin:@//oracle-eu:1521/XEPDB1
      - ORACLE_EU_USERNAME=incidents_app
      - ORACLE_EU_PASSWORD=AppIncidents2025
      - ORACLE_AF_URL=jdbc:oracle:thin:@//oracle-af:1521/XEPDB1
      - ORACLE_AF_USERNAME=incidents_app
      - ORACLE_AF_PASSWORD=AppIncidents2025
      - ORACLE_US_URL=jdbc:oracle:thin:@//oracle-us:1521/XEPDB1
      - ORACLE_US_USERNAME=incidents_app
      - ORACLE_US_PASSWORD=AppIncidents2025
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.OracleDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_FLYWAY_ENABLED=false
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8180/realms/cloudops-realm
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8180/realms/cloudops-realm/protocol/openid-connect/certs
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_PRODUCER_KEY_SERIALIZER=org.apache.kafka.common.serialization.StringSerializer
      - SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER=org.springframework.kafka.support.serializer.JsonSerializer
      - SPRING_KAFKA_PRODUCER_PROPERTIES_SPRING_JSON_ADD_TYPE_HEADERS=false
      - LOGGING_LEVEL_IO_CLOUDOPS=DEBUG
    depends_on:
      oracle-eu:
        condition: service_healthy
      oracle-af:
        condition: service_healthy
      oracle-us:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - cloudops-network

  # ═══════════════════════════════════════════════════════════════
  # NOTIFICATION SERVICE
  # ═══════════════════════════════════════════════════════════════
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@//oracle-eu:1521/XEPDB1
      - SPRING_DATASOURCE_USERNAME=incidents_app
      - SPRING_DATASOURCE_PASSWORD=AppIncidents2025
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=oracle.jdbc.OracleDriver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.OracleDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_FLYWAY_ENABLED=false
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8180/realms/cloudops-realm
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8180/realms/cloudops-realm/protocol/openid-connect/certs
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_CONSUMER_GROUP_ID=notification-service
      - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=earliest
      - SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER=org.apache.kafka.common.serialization.StringDeserializer
      - SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER=org.springframework.kafka.support.serializer.JsonDeserializer
      - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES=io.cloudops.*
      - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_USE_TYPE_HEADERS=false
      - SPRING_MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - SPRING_MAIL_PORT=${MAIL_PORT:-587}
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME:-test@cloudops.io}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD:-testpassword}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
      - LOGGING_LEVEL_IO_CLOUDOPS=DEBUG
    depends_on:
      oracle-eu:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - cloudops-network

  # ═══════════════════════════════════════════════════════════════
  # REPORTING SERVICE — Sprint 3
  # ═══════════════════════════════════════════════════════════════
  reporting-service:
    build:
      context: .
      dockerfile: reporting-service/Dockerfile
    container_name: reporting-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8084
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@//oracle-eu:1521/XEPDB1
      - SPRING_DATASOURCE_USERNAME=incidents_app
      - SPRING_DATASOURCE_PASSWORD=AppIncidents2025
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=oracle.jdbc.OracleDriver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.OracleDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_FLYWAY_ENABLED=false
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://keycloak:8180/realms/cloudops-realm
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8180/realms/cloudops-realm/protocol/openid-connect/certs
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_CONSUMER_GROUP_ID=reporting-service
      - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=earliest
      - SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER=org.apache.kafka.common.serialization.StringDeserializer
      - SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER=org.springframework.kafka.support.serializer.JsonDeserializer
      - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES=io.cloudops.*
      - SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_USE_TYPE_HEADERS=false
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_CACHE_TYPE=redis
      - LOGGING_LEVEL_IO_CLOUDOPS=DEBUG
    depends_on:
      oracle-eu:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - cloudops-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  oracle-eu-data:
  oracle-af-data:
  oracle-us-data:
  keycloak-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  redis-data:

networks:
  cloudops-network:
    driver: bridge