name: CloudOps CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com
  JAVA_VERSION: '17'

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — BUILD (sans tests)
  # ════════════════════════════════════════════════════════════════
  build-test:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn clean package -B --no-transfer-progress -DskipTests

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — SCAN SECURITE TRIVY
  # ════════════════════════════════════════════════════════════════
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-test

    strategy:
      matrix:
        service: [api-gateway, incident-service, notification-service, reporting-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ matrix.service }}/Dockerfile \
            -t ${{ matrix.service }}:scan \
            .

      - name: Scan image avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:scan
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — BUILD & PUSH ECR
  # ════════════════════════════════════════════════════════════════
  push-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push'

    strategy:
      matrix:
        service: [api-gateway, incident-service, notification-service, reporting-service]

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (tag, label)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/cloudops/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ matrix.service }}/Dockerfile \
            -t ${{ steps.meta.outputs.tags }} \
            .

      - name: Push to ECR
        run: docker push ${{ steps.meta.outputs.tags }}

  # ════════════════════════════════════════════════════════════════
  # JOB 4 — DEPLOY DEV (automatique sur develop)
  # ════════════════════════════════════════════════════════════════
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: push-ecr
    if: github.ref == 'refs/heads/develop'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name cloudops-dev-eks

      - name: Deploy avec Helm (dev)
        run: |
          helm upgrade --install cloudops-app ./helm/cloudops-app \
            --namespace cloudops \
            --create-namespace \
            --values helm/cloudops-app/values.yaml \
            --values helm/cloudops-app/values-dev.yaml \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageRegistry=${{ env.ECR_REGISTRY }} \
            --wait \
            --timeout 10m

      - name: Verify deployment
        run: kubectl get pods -n cloudops

  # ════════════════════════════════════════════════════════════════
  # JOB 5 — DEPLOY STAGING (automatique sur main)
  # ════════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy to STAGING
    runs-on: ubuntu-latest
    needs: push-ecr
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name cloudops-staging-eks

      - name: Deploy avec Helm (staging)
        run: |
          helm upgrade --install cloudops-app ./helm/cloudops-app \
            --namespace cloudops \
            --create-namespace \
            --values helm/cloudops-app/values.yaml \
            --values helm/cloudops-app/values-staging.yaml \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageRegistry=${{ env.ECR_REGISTRY }} \
            --wait \
            --timeout 10m

      - name: Verify deployment
        run: |
          kubectl get pods -n cloudops
          kubectl get ingress -n cloudops

  # ════════════════════════════════════════════════════════════════
  # JOB 6 — DEPLOY PROD (manuel — approval gate)
  # ════════════════════════════════════════════════════════════════
  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name cloudops-prod-eks

      - name: Deploy avec Helm (prod)
        run: |
          helm upgrade --install cloudops-app ./helm/cloudops-app \
            --namespace cloudops \
            --create-namespace \
            --values helm/cloudops-app/values.yaml \
            --values helm/cloudops-app/values-prod.yaml \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageRegistry=${{ env.ECR_REGISTRY }} \
            --atomic \
            --timeout 15m

      - name: Smoke test prod
        run: |
          kubectl get pods -n cloudops
          kubectl rollout status deployment/api-gateway -n cloudops
          kubectl rollout status deployment/incident-service -n cloudops

      - name: Notify Slack (succès)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ CloudOps déployé en PROD — commit ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}