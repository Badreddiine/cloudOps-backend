name: Notification Service CI

on:
  push:
    paths:
      - 'notification-service/**'
      - 'common/**'
      - '.github/workflows/notification-service.yml'
  pull_request:
    paths:
      - 'notification-service/**'
      - 'common/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build common module
        run: mvn -pl common -am clean install -DskipTests

      - name: Build notification-service
        run: mvn -pl notification-service -am clean package -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: docker

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-jar
          path: notification-service/target/notification-service-*.jar
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: notification-service-jar
          path: notification-service/target/

      - name: Build Docker image
        run: |
          docker build \
            -t cloudops/notification-service:${{ github.sha }} \
            -t cloudops/notification-service:latest \
            ./notification-service

      - name: Save Docker image
        run: |
          docker save cloudops/notification-service:latest \
            | gzip > notification-service.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-docker
          path: notification-service.tar.gz
          retention-days: 3