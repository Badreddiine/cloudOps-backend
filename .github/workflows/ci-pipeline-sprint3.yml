name: CloudOps CI — Sprint 3

on:
  push:
    branches: [ main, develop, 'sprint-3/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ── Build + Tests ─────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test All Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build common module
        run: mvn clean install -pl common -am -DskipTests -q

      - name: Test incident-service
        run: mvn test -pl incident-service -Dspring.profiles.active=test
        continue-on-error: false

      - name: Test notification-service
        run: mvn test -pl notification-service -Dspring.profiles.active=test
        continue-on-error: false

      # Sprint 3 : nouveau service
      - name: Test reporting-service
        run: mvn test -pl reporting-service -Dspring.profiles.active=test
        continue-on-error: false
        env:
          # Testcontainers a besoin de Docker dans le runner GitHub
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Coverage Report — reporting-service
        run: mvn jacoco:report -pl reporting-service
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: reporting-service/target/site/jacoco/jacoco.xml
          flags: reporting-service
        continue-on-error: true

  # ── Build Docker Images ────────────────────────────────────────────────────
  docker-build:
    name: Docker Build (validation)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JARs
        run: mvn clean package -DskipTests -q

      - name: Build Docker image — reporting-service
        run: |
          docker build \
            -f reporting-service/Dockerfile \
            -t cloudops/reporting-service:${{ github.sha }} \
            .

      - name: Scan CVE avec Trivy — reporting-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cloudops/reporting-service:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: 'CRITICAL'
        continue-on-error: true  # Ne bloque pas en Sprint 3, obligatoire en Sprint 4

  # ── Smoke Test docker-compose ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test docker-compose up
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JARs
        run: mvn clean package -DskipTests -q

      - name: Start services
        run: |
          docker compose up -d oracle-eu redis kafka keycloak
          echo "Attente Oracle (90s)..."
          sleep 90

      - name: Start application services
        run: |
          docker compose up -d incident-service notification-service reporting-service api-gateway

      - name: Wait for reporting-service health
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8084/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ reporting-service healthy"
              break
            fi
            echo "Tentative $i/20 — status $STATUS, attente..."
            sleep 10
          done

      - name: Test endpoint dashboard (sans auth = 401 attendu)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/reporting/dashboard)
          echo "Status /api/reporting/dashboard : $STATUS"
          # 401 = le service répond mais rejette sans token (comportement correct)
          [ "$STATUS" = "401" ] && echo "✓ Gateway + Reporting OK" || exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v
