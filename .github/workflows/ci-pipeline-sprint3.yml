name: CloudOps CI — Sprint 3

on:
  push:
    branches: [ main, develop, 'sprint-3/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:

  build:
    name: Build All Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build all modules without tests
        run: mvn clean package -DskipTests -q

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image — reporting-service
        run: |
          docker build \
            -f reporting-service/Dockerfile \
            -t cloudops/reporting-service:${{ github.sha }} \
            .