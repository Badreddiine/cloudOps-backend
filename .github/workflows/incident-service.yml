name: Incident Service CI

on:
  push:
    paths:
      - 'incident-service/**'
      - 'common/**'
      - '.github/workflows/incident-service.yml'
  pull_request:
    paths:
      - 'incident-service/**'
      - 'common/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build common module
        run: mvn -pl common -am clean install -DskipTests

      - name: Build incident-service
        run: mvn -pl incident-service -am clean package -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: docker

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: incident-service-jar
          path: incident-service/target/incident-service-*.jar
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn -pl common,incident-service -am clean package -DskipTests

      - name: Build Docker image
        run: |
          docker build \
            -t cloudops/incident-service:${{ github.sha }} \
            -t cloudops/incident-service:latest \
            ./incident-service

      - name: Save Docker image
        run: |
          docker save cloudops/incident-service:latest \
            | gzip > incident-service.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: incident-service-docker
          path: incident-service.tar.gz
          retention-days: 3